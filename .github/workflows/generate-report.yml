name: Generate Seneca Report

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Check cache
        run: |
          if [ -f ".cache/search-results.json" ]; then
            echo "Cache found, will use it."
          else
            echo "No cache found, will run full search."
          fi

      - name: Generate report
        run: node repo-maintain.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USE_CACHE: ${{ hashFiles('.cache/search-results.json') != '' && 'true' || 'false' }}

      - name: Upload report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: seneca-report
          path: |
            REPORT.md
            REPORT.csv

      - name: Commit report to repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add REPORT.md REPORT.csv index.html .cache/
          git diff --staged --quiet || git commit -m "chore: update Seneca report [skip ci]"
          git push origin HEAD:feature/fork-preview
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
